name: Deploy to GoDaddy Shared Hosting

on:
  push:
    branches:
      - main   # change this if you use another branch

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Upload via FTP to GoDaddy
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: react.vishful.co.in  # replace with your FTP host
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./                # the folder you want to upload
          server-dir: /public_html/vishful   # usually this is your website root
          dry-run: true               # set true to test without uploading