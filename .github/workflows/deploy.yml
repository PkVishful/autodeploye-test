name: Deploy to GoDaddy Shared Hosting

on:
  push:
    branches:
      - main   # change this if you use another branch

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Add .htaccess for SPA routing
        run: |
          echo "RewriteEngine On" > dist/.htaccess
          echo "RewriteBase /" >> dist/.htaccess
          echo "RewriteRule ^index\\.html$ - [L]" >> dist/.htaccess
          echo "RewriteCond %{REQUEST_FILENAME} !-f" >> dist/.htaccess
          echo "RewriteCond %{REQUEST_FILENAME} !-d" >> dist/.htaccess
          echo "RewriteRule . /index.html [L]" >> dist/.htaccess

      - name: Upload via FTP to GoDaddy
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: vishful.co.in  # replace with your FTP host
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/                # the folder you want to upload (Vite default)
          server-dir: /public_html/vishful   # must end with a slash
          dry-run: false               # set true to test without uploading